<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英語知識共有</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        :root { 
            --pico-font-size: 14px; 
            --pico-border-radius: 6px;
            --pico-background-color: #fcfcfb;
            --pico-color: #37352f;
            --pico-primary: #475569;
        }

        body { 
            background-color: #f7f7f5; 
            color: #37352f; 
            font-family: "Inter", "Segoe UI", sans-serif;
        }

        /* ヘッダー・検索・ガイド */
        .header-flex { display: flex; justify-content: space-between; align-items: center; gap: 15px; margin-bottom: 1rem; }
        .toolbar { display: flex; flex-grow: 1; gap: 10px; align-items: center; }
        .toolbar input { margin-bottom: 0 !important; }
        .add-btn { white-space: nowrap; width: auto !important; margin-bottom: 0 !important; background-color: #37352f; border: none; }
        
        .usage-guide { background: #fff; border: 1px solid #e5e5e1; padding: 0.8rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.8rem; }

        /* タグ一覧（チップ）の調整 */
        #tag-cloud { margin-bottom: 1.5rem; display: flex; flex-wrap: wrap; gap: 8px; }
        .tag-chip {
            cursor: pointer;
            padding: 4px 14px; /* 横に少し広めに */
            margin: 2px 0; /* 縦の隙間を確保 */
            border-radius: 20px;
            font-size: 0.75rem;
            background: #ebebe9;
            color: #5f5e5b;
            transition: all 0.2s;
        }
        .tag-chip.active { background: #37352f; color: #fff; }

        /* 3カラムグリッド配置 */
        #list { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); /* 縦3列 */
            grid-gap: 12px; /* カード間の隙間を詰める */
        }

        /* カードデザイン */
        article.card { 
            background: #fff;
            border: 1px solid #e5e5e1;
            padding: 1rem;
            margin-bottom: 0; /* grid-gapで制御するため0に */
            height: 100%; /* 高さを揃える */
            display: flex;
            flex-direction: column;
        }
        .card-title { font-size: 1rem; font-weight: 700; margin-bottom: 0.4rem; line-height: 1.3; }
        .card-body { font-size: 0.85rem; color: #666; flex-grow: 1; margin-bottom: 0.8rem; }
        
        .tag { 
            padding: 1px 6px; 
            margin: 0 4px 4px 0; 
            font-size: 0.7rem; 
            background: #f1f1ef; 
            border: 1px solid #e5e5e1;
        }
        .author-tag { font-size: 0.7rem; color: #aaa; margin-top: auto; }

        /* モーダル */
        dialog article { width: 90% !important; max-width: 800px !important; }

        .hidden {
            display: none;
        }

        /* レスポンス対応 */
        @media (max-width: 900px) { #list { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 600px) { 
            #list { grid-template-columns: 1fr; }
            .header-flex { flex-direction: column; align-items: flex-start; }
            .toolbar { width: 100%; }
        }
    </style>

</head>
<body>
    <main class="container">
        <header>
            <div class="header-flex">
                <h2>English DB</h2>
                <div class="toolbar">
                    <input type="text" id="search" placeholder="検索..." oninput="render()">
                    <button onclick="openModal('add')" class="add-btn">＋ New Entry</button>
                </div>
            </div>
            
            <details class="usage-guide">
                <summary>利用ガイド（必ずお読みください）</summary>
                <ul>
                    <li><strong>閲覧：</strong> タイトル、本文、タグで検索・絞り込みが可能です。</li>
                    <li><strong>投稿：</strong> 右上の「＋ New Entry」から追加できます。</li>
                    <li><strong>編集・削除：</strong> 各データの詳細画面から行えます。投稿時に設定した「パスワード」が必要です。</li>
                    <li><strong>注意：</strong> パスワードは再発行できません。忘れないように管理してください。</li>
                </ul>
            </details>

            <div id="tag-cloud"></div>
        </header>

        <div id="list">Loading...</div>
    </main>

    <dialog id="modal">
        <article>
            <header>
                <a href="#close" aria-label="Close" class="close" onclick="closeModal()"></a>
                <strong id="modalTitle" style="font-size: 1.4rem;">詳細</strong>
            </header>
            
            <div id="viewMode">
                <p id="viewAuthor" style="font-size: 0.85rem; color: #999; margin-bottom: 0.8rem;"></p>
                <pre id="viewBody"></pre>
                <div id="viewTags" style="margin-top: 1rem;"></div>
                <footer style="text-align: right; padding-top: 1.5rem; border-top: 1px solid #eee; margin-top: 2rem;">
                    <button class="secondary outline btn-sm" onclick="switchMode('edit')">編集</button>
                    <button class="contrast outline btn-sm" onclick="switchMode('delete')">削除</button>
                </footer>
            </div>

            <div id="editMode" class="hidden">
                <form id="dataForm">
                    <input type="hidden" id="f-id">
                    <div class="grid">
                        <label>タイトル<input type="text" id="f-title" placeholder="例: 前置詞at" required></label>
                        <label id="authorLabel">作成者名<input type="text" id="f-author" placeholder="あなたの名前"></label>
                    </div>
                    <label>本文<textarea id="f-body" rows="8" required placeholder="ここに詳しく記入してください..."></textarea></label>
                    <div class="grid">
                        <label>タグ(半角カンマ区切り) <input type="text" id="f-tags" placeholder="文法, 単語, フレーズ"></label>
                        <label>編集パスワード（必須）<input type="password" id="f-pass" required placeholder="本人確認用"></label>
                    </div>
                    <button type="button" id="submitBtn" onclick="saveData()" style="margin-top: 1rem;">データを保存する</button>
                </form>
            </div>
        </article>
    </dialog>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbza9-5IolyrUWc1PzqwADb9NpRo_Kb7WghNsvSz4jtZFCJt-H05SLswXf2Wa05jjZNx/exec";
        let allData = [];
        let currentItem = null;
        let selectedTag = null; // 現在選択されているタグを保持

        async function fetchData() {
            try {
                const res = await fetch(GAS_URL);
                allData = await res.json();
                renderTagCloud(); // タグ一覧を生成
                render();
            } catch (e) {
                document.getElementById('list').innerText = "データの取得に失敗しました。";
            }
        }

        // タグ一覧を表示する関数
        function renderTagCloud() {
            const tagCloud = document.getElementById('tag-cloud');
            // 全データからタグを抽出してユニークなリストを作成
            const allTags = allData.flatMap(item => 
                item.Tags ? item.Tags.split(',').map(t => t.trim()) : []
            ).filter(t => t !== "");
            
            const uniqueTags = [...new Set(allTags)].sort();

            tagCloud.innerHTML = `
                <span class="tag-chip ${selectedTag === null ? 'active' : ''}" 
                    onclick="filterByTag(null)">All</span>
                ${uniqueTags.map(tag => `
                    <span class="tag-chip ${selectedTag === tag ? 'active' : ''}" 
                        onclick="filterByTag('${tag}')">${tag}</span>
                `).join('')}
            `;
        }

        function filterByTag(tag) {
            selectedTag = tag;
            renderTagCloud(); // ボタンの見た目を更新
            render(); // リストを更新
        }

        function render() {
            const q = document.getElementById('search').value.toLowerCase();
            const list = document.getElementById('list');
            
            // 1. 検索とタグでフィルタリング
            let filtered = allData.filter(item => {
                const matchesSearch = item.Title.toLowerCase().includes(q) || 
                                    item.Body.toLowerCase().includes(q) || 
                                    item.Tags.toLowerCase().includes(q);
                const matchesTag = selectedTag === null || 
                                (item.Tags && item.Tags.split(',').map(t => t.trim()).includes(selectedTag));
                
                return matchesSearch && matchesTag;
            });

            // 2. ★最新順にするために配列を逆順にする
            filtered.reverse();

            if(filtered.length === 0) {
                list.innerHTML = "<p style='grid-column: 1/-1; text-align: center; padding: 2rem; color: #999;'>該当するデータが見つかりません。</p>";
                return;
            }

            // 3. HTMLを生成
            list.innerHTML = filtered.map(item => {
                const shortBody = item.Body.length > 120 ? item.Body.substring(0, 120) + "..." : item.Body;
                return `
                <article class="card" onclick="showDetail('${item.ID}')">
                    <div class="card-title">${item.Title}</div>
                    <div class="card-body">${shortBody}</div>
                    <div>
                        ${item.Tags.split(',').filter(t => t.trim()).map(t => `<span class="tag">${t.trim()}</span>`).join('')}
                    </div>
                    <span class="author-tag">By ${item.Author}</span>
                </article>
            `}).join('');
        }


        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hash = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function showDetail(id) {
            currentItem = allData.find(item => item.ID == id);
            document.getElementById('modalTitle').innerText = currentItem.Title;
            document.getElementById('viewBody').innerText = currentItem.Body;
            document.getElementById('viewAuthor').innerText = "作成者: " + currentItem.Author;
            document.getElementById('viewTags').innerHTML = currentItem.Tags.split(',').filter(t => t.trim()).map(t => `<span class="tag">${t.trim()}</span>`).join('');
            switchMode('view');
            document.getElementById('modal').showModal();
        }

        function openModal() {
            currentItem = null;
            document.getElementById('dataForm').reset();
            document.getElementById('f-id').value = "";
            document.getElementById('modalTitle').innerText = "新規データの追加";
            switchMode('edit');
            document.getElementById('authorLabel').style.display = "block";
            document.getElementById('modal').showModal();
        }

        function switchMode(mode) {
            const isEdit = mode === 'edit' || mode === 'delete';
            const isDelete = mode === 'delete';
            
            document.getElementById('viewMode').classList.toggle('hidden', isEdit);
            document.getElementById('editMode').classList.toggle('hidden', !isEdit);
            
            // フォーム要素の取得
            const fTitle = document.getElementById('f-title');
            const fBody = document.getElementById('f-body');
            const fTags = document.getElementById('f-tags');
            const fAuthorLabel = document.getElementById('authorLabel');

            if(isEdit && currentItem) {
                document.getElementById('f-id').value = currentItem.ID;
                fTitle.value = currentItem.Title;
                fBody.value = currentItem.Body;
                fTags.value = currentItem.Tags;
                
                // 削除モードなら編集不可（フォーカス無効）にする
                fTitle.readOnly = isDelete;
                fBody.readOnly = isDelete;
                fTags.readOnly = isDelete;
                fAuthorLabel.style.display = "none";

                if (isDelete) {
                    document.getElementById('modalTitle').innerText = "データの削除";
                    document.getElementById('submitBtn').innerText = "パスワードを確認して削除する";
                    document.getElementById('submitBtn').className = "contrast"; // ボタン色を削除用に
                } else {
                    document.getElementById('modalTitle').innerText = "データの編集";
                    document.getElementById('submitBtn').innerText = "更新を保存する";
                    document.getElementById('submitBtn').className = ""; // 通常色
                }
            } else {
                // 新規追加モード
                fTitle.readOnly = false;
                fBody.readOnly = false;
                fTags.readOnly = false;
                document.getElementById('modalTitle').innerText = "新規データの追加";
                fAuthorLabel.style.display = "block";
                document.getElementById('submitBtn').innerText = "データを保存する";
                document.getElementById('submitBtn').className = "";
            }
        }

        async function saveData() {
            const btn = document.getElementById('submitBtn');
            const isDelete = document.getElementById('modalTitle').innerText.includes("削除");
            const mode = document.getElementById('f-id').value ? (isDelete ? "delete" : "edit") : "add";
            const rawPassword = document.getElementById('f-pass').value;

            if(!rawPassword) {
                alert("本人確認のためパスワードを入力してください");
                return;
            }

            // 削除時はタイトル・本文の空チェックをスルー
            if (!isDelete) {
                if(!document.getElementById('f-title').value || !document.getElementById('f-body').value) {
                    alert("タイトルと本文を入力してください");
                    return;
                }
            }

            const hashedPassword = await hashPassword(rawPassword);
            
            const payload = {
                mode: mode,
                id: document.getElementById('f-id').value,
                title: document.getElementById('f-title').value,
                body: document.getElementById('f-body').value,
                tags: document.getElementById('f-tags').value,
                author: document.getElementById('f-author').value,
                password: hashedPassword
            };

            btn.disabled = true;
            const originalText = btn.innerText;
            btn.innerText = "処理中...";

            try {
                const res = await fetch(GAS_URL, { method: "POST", body: JSON.stringify(payload) });
                const result = await res.text();

                if (result === "Success") {
                    alert(isDelete ? "削除が完了しました" : "保存が完了しました");
                    closeModal();
                    await fetchData(); // データを再読込
                } else {
                    alert("認証エラー: パスワードが正しくないか、既にデータが削除されています (" + result + ")");
                    btn.disabled = false;
                    btn.innerText = originalText;
                }
            } catch (e) {
                alert("通信エラーが発生しました");
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }



        function closeModal() { document.getElementById('modal').close(); }
        fetchData();
    </script>
</body>
</html>
